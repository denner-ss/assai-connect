<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assaí Connect</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--glass:rgba(7,18,31,.78);
--glass2:rgba(11,28,46,.82);
--border:rgba(255,255,255,.08);
--text:#F5F9FF;
--muted:#AFC4DA;
--orange:#F58220;
--shadow:0 12px 40px rgba(0,0,0,.45);
}

body{
font-family:Inter,sans-serif;
background:
linear-gradient(rgba(5,11,19,.88),rgba(5,11,19,.95)),
url('https://diariodorio.com/wp-content/uploads/2023/10/image-1.jpg');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:var(--text);
padding:24px;
min-height:100vh;
}

.container{max-width:760px;margin:auto}

.brand{
display:flex;
align-items:center;
gap:16px;
margin-bottom:24px;
}

.logo{
width:70px;
height:70px;
background:#fff;
padding:10px;
border-radius:22px;
}

h1{
font-size:34px;
font-weight:800;
}

.subtitle{
color:var(--muted);
margin-top:4px;
}

.search{
width:100%;
height:64px;
border:none;
outline:none;
padding:0 24px;
border-radius:24px;
background:var(--glass);
border:1px solid var(--border);
color:white;
margin-bottom:24px;
font-size:16px;
backdrop-filter:blur(18px);
}

.list{
display:flex;
flex-direction:column;
gap:18px;
}

.card{
background:var(--glass);
border:1px solid var(--border);
border-radius:28px;
padding:24px;
cursor:pointer;
backdrop-filter:blur(18px);
box-shadow:var(--shadow);
transition:.25s;
}

.card:hover{
transform:translateY(-3px);
background:var(--glass2);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
gap:10px;
}

.name{
font-size:22px;
font-weight:700;
}

.badge{
background:rgba(245,130,32,.14);
padding:8px 14px;
border-radius:999px;
font-size:12px;
font-weight:700;
color:#ffd7b0;
}

.info{
color:var(--muted);
margin-top:6px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
align-items:flex-end;
justify-content:center;
backdrop-filter:blur(6px);
}

.modal.active{
display:flex;
}

.modal-content{
width:100%;
max-width:760px;
background:#07121f;
padding:30px;
border-radius:32px 32px 0 0;
}

.section{
margin-top:22px;
}

.section-title{
font-size:12px;
letter-spacing:.12em;
text-transform:uppercase;
color:var(--orange);
margin-bottom:12px;
font-weight:700;
}

.info-card{
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.08);
padding:20px;
border-radius:22px;
}

.info-card p{
color:var(--muted);
margin-bottom:8px;
line-height:1.6;
}

.buttons{
display:flex;
gap:12px;
margin-top:24px;
}

.btn{
flex:1;
height:56px;
border:none;
border-radius:18px;
font-weight:700;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
cursor:pointer;
}

.primary{
background:linear-gradient(135deg,#F58220,#ffab5b);
color:white;
}

.secondary{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
color:white;
}

.footer{
margin-top:40px;
text-align:center;
color:rgba(255,255,255,.55);
font-size:13px;
}
</style>
</head>
<body>

<div class="container">

<div class="brand">
<img src="https://creator.acelerai.com.br/resourses/creator/app/img/assai-1.png" class="logo">

<div>
<h1>Assaí Connect</h1>
<p class="subtitle">Gestão inteligente de promotores e fornecedores</p>
</div>
</div>

<input type="text" class="search" id="search" placeholder="Buscar promotor, fornecedor ou supervisor">

<div class="list" id="list"></div>

<div class="footer">
developed by Denner Sousa - Chefe de Seção - AssaÍ Boulevard
</div>

</div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

let data = [];

const list = document.getElementById('list');
const search = document.getElementById('search');
const modal = document.getElementById('modal');
const modalContent = document.getElementById('modalContent');

async function loadCSV(){

try{

const response = await fetch('./dados.csv');

if(!response.ok){
throw new Error('Arquivo CSV não encontrado');
}

const csv = await response.text();

const lines = csv
.replace(/\r/g,'')
.trim()
.split('\n');

const separator = lines[0].includes(';') ? ';' : ',';

const headers = lines.shift().split(separator);

data = lines.map(line => {

const cols = line.split(separator);

return {
id: cols[0] || '',
nome: cols[1] || '',
telefone: cols[2] || '',
fornecedor_nome: cols[3] || '',
supervisor: cols[4] || '',
dias_trabalho: cols[5] || '',
situacao: cols[6] || ''
};

});

render();

}catch(err){

console.error(err);

list.innerHTML = `
<div class="card">
<div class="name">Erro ao carregar banco de dados</div>
<div class="info">Verifique se o arquivo dados.csv está na raiz do projeto.</div>
</div>
`;

}

}

function render(filter=''){

list.innerHTML='';

const filtered = data.filter(item => {

const term = filter.toLowerCase();

return (
item.nome.toLowerCase().includes(term) ||
item.fornecedor_nome.toLowerCase().includes(term) ||
item.supervisor.toLowerCase().includes(term)
);

});

filtered.forEach(item => {

const card = document.createElement('div');

card.className='card';

card.innerHTML = `
<div class="top">
<div class="name">${item.nome}</div>
<div class="badge">${item.fornecedor_nome}</div>
</div>

<div class="info">
📞 ${formatPhone(item.telefone)}
</div>

<div class="info">
👨‍💼 Supervisor: ${formatPhone(item.supervisor)}
</div>
`;

card.onclick = () => openModal(item);

list.appendChild(card);

});

}

function openModal(item){

const status = item.situacao === 'ATIVO'
? '🟢'
: '🔴';

modalContent.innerHTML = `

<h2 style="font-size:30px;margin-bottom:6px;">
${item.nome}
</h2>

<p style="color:#AFC4DA;">
Promotor Assaí
</p>

<div class="section">

<div class="section-title">
Contato
</div>

<div class="info-card">

<p>📞 Promotor: ${formatPhone(item.telefone)}</p>

<p>👨‍💼 Supervisor: ${formatPhone(item.supervisor)}</p>

<p>📅 Dias de trabalho: ${item.dias_trabalho}</p>

<p>${status} Status do promotor: ${item.situacao}</p>

</div>

</div>

<div class="section">

<div class="section-title">
Fornecedor
</div>

<div class="info-card">

<p>🏢 Marca: ${item.fornecedor_nome}</p>

</div>

</div>

<div class="buttons">

<a class="btn primary"
href="https://wa.me/55${item.telefone}"
target="_blank">
WhatsApp
</a>

<button class="btn secondary" onclick="closeModal()">
Fechar
</button>

</div>
`;

modal.classList.add('active');

}

function closeModal(){
modal.classList.remove('active');
}

modal.addEventListener('click', e => {
if(e.target === modal){
closeModal();
}
});

search.addEventListener('input', e => {
render(e.target.value);
});

function formatPhone(phone){

phone = phone.replace(/\D/g,'');

if(phone.length === 11){

return phone.replace(
/(\d{2})(\d{5})(\d{4})/,
'($1) $2-$3'
);

}

return phone;

}

loadCSV();

</script>

</body>
</html>
